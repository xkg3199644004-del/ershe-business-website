<div class="container">
    <h2 class="page-title mx-auto">二奢商家入驻指南</h2>
    <div class="card mt-4">
        <div class="card-header">入驻条件</div>
        <div class="card-body">
            <p>1. 具备合法营业执照，经营范围含奢侈品/二手奢侈品</p>
            <p>2. 拥有正品货源，支持中检/国检鉴定</p>
            <p>3. 无违规售假记录，诚信经营</p>
        </div>
    </div>
    <div class="card mt-4">
        <div class="card-header">入驻流程（4步完成）</div>
        <div class="card-body">
            <h5>第一步：提交申请</h5>
            <p>填写商家信息，上传营业执照、鉴定资质</p>
            <h5>第二步：官方审核</h5>
            <p>1-3个工作日完成资质审核</p>
            <h5>第三步：签约开通</h5>
            <p>签署入驻协议，开通商家权限</p>
            <h5>第四步：正式运营</h5>
            <p>上架商品，开启小红书二奢经营</p>
        </div>
    </div>
</div>
